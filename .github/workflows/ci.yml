name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build (SwiftPM)
        run: swift build
      - name: Test
        run: swift test
      - name: Build app (Xcode project)
        run: |
          xcodebuild -project BulkGitHub.xcodeproj \
            -scheme BulkGitHubApp -configuration Debug \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_ALLOWED=NO build
